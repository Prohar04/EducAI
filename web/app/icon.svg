<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="og" x1="20" y1="5" x2="85" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- ── Top face (rhombus) ─────────────────────────────── -->
  <path d="M50 11 L87 29 L50 47 L13 29 Z"
        stroke="url(#og)" stroke-width="5.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Left face ─────────────────────────────────────── -->
  <path d="M13 29 L13 63 L50 81 L50 47"
        stroke="url(#og)" stroke-width="5.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Right face ────────────────────────────────────── -->
  <path d="M87 29 L87 63 L50 81 L50 47"
        stroke="url(#og)" stroke-width="5.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── Circuit traces on left face ───────────────────── -->
  <!--   L-shaped PCB trace: left node → right then up → right node -->
  <path d="M27 62 L27 54 L43 54"
        stroke="url(#og)" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left node -->
  <circle cx="27" cy="62" r="4"
          fill="white" stroke="url(#og)" stroke-width="2.8"/>
  <!-- Right node -->
  <circle cx="43" cy="54" r="4"
          fill="white" stroke="url(#og)" stroke-width="2.8"/>

  <!-- ── Tassel ─────────────────────────────────────────── -->
  <!-- Cord from top-right corner going down -->
  <line x1="87" y1="29" x2="87" y2="55"
        stroke="url(#og)" stroke-width="4" stroke-linecap="round"/>
  <!-- Tassel bulb -->
  <circle cx="87" cy="61" r="5.5" fill="url(#og)"/>
</svg>
