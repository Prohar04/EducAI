<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c1710"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1a0e"/>
      <stop offset="100%" stop-color="#161208"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#d97706" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="420" fill="url(#bg)" rx="20"/>

  <!-- Glow blobs -->
  <circle cx="380" cy="100" r="120" fill="#d97706" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="140" cy="320" r="90" fill="#d97706" opacity="0.05" filter="url(#blur1)"/>

  <!-- Globe outline (dashed) -->
  <circle cx="260" cy="210" r="150" stroke="#d97706" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.25"/>
  <circle cx="260" cy="210" r="100" stroke="#d97706" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.15"/>

  <!-- Meridian lines -->
  <ellipse cx="260" cy="210" rx="60" ry="150" stroke="#d97706" stroke-width="0.5" opacity="0.15" fill="none"/>
  <ellipse cx="260" cy="210" rx="120" ry="150" stroke="#d97706" stroke-width="0.5" opacity="0.10" fill="none"/>
  <!-- Equator -->
  <line x1="110" y1="210" x2="410" y2="210" stroke="#d97706" stroke-width="0.5" opacity="0.15"/>
  <line x1="145" y1="160" x2="375" y2="160" stroke="#d97706" stroke-width="0.5" opacity="0.10"/>
  <line x1="145" y1="260" x2="375" y2="260" stroke="#d97706" stroke-width="0.5" opacity="0.10"/>

  <!-- Location pins -->
  <!-- London -->
  <circle cx="218" cy="172" r="5" fill="#d97706" opacity="0.9" filter="url(#shadow)"/>
  <line x1="218" y1="172" x2="218" y2="158" stroke="#d97706" stroke-width="1.2" opacity="0.7"/>
  <circle cx="218" cy="155" r="3" fill="#d97706" opacity="0.6"/>

  <!-- Toronto -->
  <circle cx="178" cy="198" r="4" fill="#f59e0b" opacity="0.8"/>
  <line x1="178" y1="198" x2="178" y2="186" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>

  <!-- Sydney -->
  <circle cx="342" cy="265" r="5" fill="#d97706" opacity="0.9"/>
  <line x1="342" y1="265" x2="342" y2="251" stroke="#d97706" stroke-width="1.2" opacity="0.7"/>

  <!-- Berlin -->
  <circle cx="255" cy="168" r="4" fill="#f59e0b" opacity="0.8"/>

  <!-- Singapore -->
  <circle cx="322" cy="228" r="4" fill="#d97706" opacity="0.8"/>

  <!-- Route lines (arcs approximated as bezier curves) -->
  <path d="M218 172 Q240 140 255 168" stroke="#d97706" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.4"/>
  <path d="M218 172 Q210 185 178 198" stroke="#f59e0b" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.35"/>
  <path d="M255 168 Q300 200 322 228" stroke="#d97706" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.4"/>
  <path d="M342 265 Q335 245 322 228" stroke="#d97706" stroke-width="0.8" fill="none" stroke-dasharray="3 3" opacity="0.35"/>

  <!-- Floating card 1: Program match -->
  <g transform="translate(30, 60)" filter="url(#shadow)">
    <rect width="156" height="62" rx="10" fill="#1a1610" stroke="#d97706" stroke-width="0.5" opacity="0.9"/>
    <rect x="10" y="12" width="28" height="28" rx="6" fill="#d97706" opacity="0.15"/>
    <text x="20" y="30" font-family="sans-serif" font-size="13" fill="#d97706" font-weight="700">✓</text>
    <text x="46" y="25" font-family="sans-serif" font-size="8" fill="#a0a0a0">Program Match</text>
    <text x="46" y="36" font-family="sans-serif" font-size="9" fill="#f0f0f0" font-weight="600">MSc Computer Science</text>
    <text x="10" y="54" font-family="sans-serif" font-size="7.5" fill="#d97706">TU Berlin · Fit Score 94%</text>
  </g>

  <!-- Floating card 2: Scholarship alert -->
  <g transform="translate(340, 45)" filter="url(#shadow)">
    <rect width="148" height="56" rx="10" fill="#1a1610" stroke="#f59e0b" stroke-width="0.5" opacity="0.9"/>
    <circle cx="16" cy="16" r="8" fill="#f59e0b" opacity="0.2" transform="translate(8,8)"/>
    <text x="18" y="29" font-family="sans-serif" font-size="11" fill="#f59e0b">🎓</text>
    <text x="38" y="23" font-family="sans-serif" font-size="8" fill="#a0a0a0">Scholarship Alert</text>
    <text x="38" y="34" font-family="sans-serif" font-size="8.5" fill="#f0f0f0" font-weight="600">Chevening 2026</text>
    <text x="10" y="50" font-family="sans-serif" font-size="7.5" fill="#f59e0b">Deadline: Nov 4, 2026</text>
  </g>

  <!-- Floating card 3: Visa tracker -->
  <g transform="translate(348, 300)" filter="url(#shadow)">
    <rect width="138" height="52" rx="10" fill="#1a1610" stroke="#d97706" stroke-width="0.5" opacity="0.85"/>
    <text x="12" y="22" font-family="sans-serif" font-size="11" fill="#d97706">🛂</text>
    <text x="30" y="20" font-family="sans-serif" font-size="8" fill="#a0a0a0">Visa Tracker</text>
    <text x="30" y="31" font-family="sans-serif" font-size="8.5" fill="#f0f0f0" font-weight="600">Germany · 7 days avg</text>
    <rect x="12" y="36" width="80" height="6" rx="3" fill="#333"/>
    <rect x="12" y="36" width="60" height="6" rx="3" fill="#d97706" opacity="0.8"/>
    <text x="98" y="43" font-family="sans-serif" font-size="7" fill="#d97706">75%</text>
  </g>

  <!-- Center university icon -->
  <g transform="translate(230, 175)">
    <rect width="60" height="60" rx="12" fill="#1f1a0e" stroke="#d97706" stroke-width="1" opacity="0.85"/>
    <text x="10" y="40" font-family="sans-serif" font-size="32" fill="#d97706">🎓</text>
  </g>
</svg>
