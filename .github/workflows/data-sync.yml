name: Data Sync Agent

on:
  schedule:
    # Run twice daily: 06:00 UTC and 18:00 UTC
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Sync target (scholarships | programs | all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - scholarships
          - programs

jobs:
  sync:
    name: Run Data Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate required secrets
        id: validate
        run: |
          MISSING=false

          # Strip any accidental whitespace/newlines from secrets before checking
          BACKEND_URL_CLEAN=$(printf '%s' "$BACKEND_URL" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "$CRON_SECRET" | tr -d '[:space:]')

          if [ -z "$BACKEND_URL_CLEAN" ]; then
            echo "::warning::BACKEND_URL secret is not configured. Skipping sync."
            echo "   To enable: Settings → Secrets → Actions → BACKEND_URL = https://your-backend.onrender.com"
            MISSING=true
          else
            # Validate URL format — must start with http:// or https://
            case "$BACKEND_URL_CLEAN" in
              http://*|https://*)
                echo "Backend URL scheme: OK"
                ;;
              *)
                echo "::warning::BACKEND_URL does not start with http:// or https:// — value is malformed. Skipping sync."
                echo "   Current value prefix: ${BACKEND_URL_CLEAN:0:20}..."
                echo "   Fix: Settings → Secrets → Actions → BACKEND_URL = https://your-backend.onrender.com"
                MISSING=true
                ;;
            esac
          fi

          if [ -z "$CRON_SECRET_CLEAN" ]; then
            echo "::warning::CRON_SECRET secret is not configured. Skipping sync."
            echo "   To enable: Settings → Secrets → Actions → CRON_SECRET = <same value as server CRON_SECRET>"
            MISSING=true
          fi

          if [ "$MISSING" = "true" ]; then
            echo "secrets_ready=false" >> "$GITHUB_OUTPUT"
          else
            # Export trimmed values for the next step
            echo "secrets_ready=true" >> "$GITHUB_OUTPUT"
            echo "backend_url=${BACKEND_URL_CLEAN}" >> "$GITHUB_OUTPUT"
            echo "Backend URL configured: ${BACKEND_URL_CLEAN:0:30}..."
          fi
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Trigger data sync
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          # Use sanitised URL from the validate step output
          CLEAN_URL="${{ steps.validate.outputs.backend_url }}"
          TARGET="${{ github.event.inputs.target || 'all' }}"
          echo "Triggering data sync for target: $TARGET"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Run ID: $GITHUB_RUN_ID"

          CURL_EXIT=0
          HTTP_STATUS=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            --fail-with-body \
            -X POST "${CLEAN_URL}/data-sync/run" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Run-Id: ${GITHUB_RUN_ID}" \
            -d "{\"target\": \"$TARGET\"}" \
            --max-time 120 \
            --retry 2 \
            --retry-delay 5 \
            --retry-connrefused) || CURL_EXIT=$?

          echo "HTTP Status: $HTTP_STATUS"
          echo "Curl exit code: $CURL_EXIT"
          echo ""
          echo "=== Response body ==="
          python3 -m json.tool /tmp/sync_response.json 2>/dev/null || cat /tmp/sync_response.json 2>/dev/null || echo "(empty)"
          echo "=== End response ==="

          # curl exit 3 = URL malformat — should not happen after validation above, but handle defensively
          if [ "$CURL_EXIT" -eq 3 ]; then
            echo "::error::curl reported URL malformed (exit 3). BACKEND_URL may contain invalid characters."
            echo "   Sanitised URL prefix used: ${CLEAN_URL:0:50}"
            exit 1
          fi

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed (exit $CURL_EXIT). Check BACKEND_URL is reachable: ${CLEAN_URL:0:50}..."
            exit 1
          fi

          # 200 = success, 207 = partial success (some targets failed, others succeeded)
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 207 ]; then
            if [ "$HTTP_STATUS" -eq 207 ]; then
              echo "::warning::Sync completed with partial failures (207). Check response body for details."
            else
              echo "Sync completed successfully (200)."
            fi
            exit 0
          elif [ "$HTTP_STATUS" -eq 409 ]; then
            echo "::warning::Sync already running (409). Another sync job is in progress — this run is a no-op."
            exit 0
          elif [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 403 ]; then
            echo "::error::Authorization failed ($HTTP_STATUS). Verify CRON_SECRET matches server CRON_SECRET env var."
            exit 1
          elif [ "$HTTP_STATUS" -eq 000 ]; then
            echo "::error::Could not connect to backend. Verify BACKEND_URL is correct and the server is running."
            exit 1
          else
            echo "::error::Sync failed with HTTP $HTTP_STATUS. See response body above for details."
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Sync skipped (secrets not configured or invalid)
        if: steps.validate.outputs.secrets_ready == 'false'
        run: |
          echo "Data sync skipped — required secrets not configured or BACKEND_URL is malformed."
          echo "This is expected in forks and developer branches."
          echo "Configure BACKEND_URL and CRON_SECRET in repo secrets to enable scheduled sync."
          exit 0
