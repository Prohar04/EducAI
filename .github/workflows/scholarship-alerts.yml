name: Scholarship Deadline Alerts

# Runs daily at 08:00 UTC to trigger the deadline alert job.
# The job calls POST /deadline-alerts/run on the production server
# and is protected by the CRON_SECRET header.
#
# Required secrets:
#   API_BASE_URL  — e.g. https://api.educai.app
#   CRON_SECRET   — must match CRON_SECRET env var on the server

on:
  schedule:
    - cron: "0 8 * * *"      # Daily at 08:00 UTC
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  trigger-alerts:
    name: Trigger Deadline Alert Job
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.API_BASE_URL }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ API_BASE_URL secret not configured — skipping alert trigger."
            echo "   Add it at: Settings → Secrets → Actions → API_BASE_URL"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger alert job
        if: steps.check.outputs.configured == 'true'
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.API_BASE_URL }}/deadline-alerts/run")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Alert job failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Alert job completed successfully"
          echo "$BODY" | python3 -c "import sys, json; d = json.load(sys.stdin); print(f'Alerts sent: {d.get(\"alertsSent\", 0)}, Users processed: {d.get(\"usersProcessed\", 0)}')" 2>/dev/null || true
