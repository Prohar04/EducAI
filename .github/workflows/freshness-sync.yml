name: Data Freshness Sync

on:
  schedule:
    # Twice daily — 06:00 and 18:00 UTC (in addition to data-sync.yml)
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  refresh-all:
    name: Refresh All Data Sources
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate required secrets
        id: validate
        run: |
          ERRORS=""

          BACKEND_URL_CLEAN=$(printf '%s' "$BACKEND_URL" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "$CRON_SECRET" | tr -d '[:space:]')

          if [ -z "$BACKEND_URL_CLEAN" ]; then
            ERRORS="${ERRORS}\nERROR: BACKEND_URL secret is not configured."
          else
            case "$BACKEND_URL_CLEAN" in
              http://*|https://*)
                echo "Backend URL scheme: valid"
                ;;
              *)
                ERRORS="${ERRORS}\nERROR: BACKEND_URL does not start with http:// or https://"
                ;;
            esac
          fi

          if [ -z "$CRON_SECRET_CLEAN" ]; then
            ERRORS="${ERRORS}\nERROR: CRON_SECRET secret is not configured."
          fi

          if [ -n "$ERRORS" ]; then
            echo "${ERRORS}"
            echo "Cannot run freshness sync without BACKEND_URL and CRON_SECRET secrets."
            echo "secrets_ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "secrets_ready=true" >> "$GITHUB_OUTPUT"
          echo "backend_url=${BACKEND_URL_CLEAN}" >> "$GITHUB_OUTPUT"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Refresh programs data
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          BACKEND_URL_CLEAN=$(printf '%s' "${{ secrets.BACKEND_URL }}" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "${{ secrets.CRON_SECRET }}" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s -o /tmp/p.txt -w "%{http_code}" \
            --max-time 300 \
            -X POST "${BACKEND_URL_CLEAN}/api/cron/refresh-programs" \
            -H "Authorization: Bearer ${CRON_SECRET_CLEAN}")

          echo "Programs refresh: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Programs refresh failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Refresh scholarships data
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          BACKEND_URL_CLEAN=$(printf '%s' "${{ secrets.BACKEND_URL }}" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "${{ secrets.CRON_SECRET }}" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s -o /tmp/s.txt -w "%{http_code}" \
            --max-time 300 \
            -X POST "${BACKEND_URL_CLEAN}/api/cron/refresh-scholarships" \
            -H "Authorization: Bearer ${CRON_SECRET_CLEAN}")

          echo "Scholarships refresh: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Scholarships refresh failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Refresh news cache
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          BACKEND_URL_CLEAN=$(printf '%s' "${{ secrets.BACKEND_URL }}" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "${{ secrets.CRON_SECRET }}" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s -o /tmp/n.txt -w "%{http_code}" \
            --max-time 180 \
            -X POST "${BACKEND_URL_CLEAN}/api/cron/refresh-news" \
            -H "Authorization: Bearer ${CRON_SECRET_CLEAN}")

          echo "News refresh: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: News refresh failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Refresh visa data
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          BACKEND_URL_CLEAN=$(printf '%s' "${{ secrets.BACKEND_URL }}" | tr -d '[:space:]')
          CRON_SECRET_CLEAN=$(printf '%s' "${{ secrets.CRON_SECRET }}" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s -o /tmp/v.txt -w "%{http_code}" \
            --max-time 180 \
            -X POST "${BACKEND_URL_CLEAN}/api/cron/refresh-visa" \
            -H "Authorization: Bearer ${CRON_SECRET_CLEAN}")

          echo "Visa data refresh: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Visa data refresh failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Report skipped (secrets not configured)
        if: steps.validate.outputs.secrets_ready == 'false'
        run: |
          echo "CRITICAL: Freshness sync cannot run — required secrets not configured."
          echo "Set BACKEND_URL and CRON_SECRET in repo GitHub Actions secrets."
          exit 1