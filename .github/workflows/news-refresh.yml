name: News Refresh

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required secrets
        id: validate
        run: |
          ERRORS=""

          BACKEND_URL_CLEAN=$(printf '%s' "$BACKEND_URL" | tr -d '[:space:]' | sed 's|/*$||')
          CRON_SECRET_CLEAN=$(printf '%s' "$CRON_SECRET" | tr -d '[:space:]')

          if [ -z "$BACKEND_URL_CLEAN" ]; then
            ERRORS="${ERRORS}\nERROR: BACKEND_URL secret is not configured."
          else
            case "$BACKEND_URL_CLEAN" in
              http://*|https://*)
                echo "Backend URL scheme: valid"
                ;;
              *)
                ERRORS="${ERRORS}\nERROR: BACKEND_URL does not start with http:// or https://"
                ;;
            esac
          fi

          if [ -z "$CRON_SECRET_CLEAN" ]; then
            ERRORS="${ERRORS}\nERROR: CRON_SECRET secret is not configured."
          fi

          if [ -n "$ERRORS" ]; then
            echo "${ERRORS}"
            echo "Cannot run news refresh without BACKEND_URL and CRON_SECRET secrets."
            echo "secrets_ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "secrets_ready=true" >> "$GITHUB_OUTPUT"
          echo "backend_url=${BACKEND_URL_CLEAN}" >> "$GITHUB_OUTPUT"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Refresh news
        if: steps.validate.outputs.secrets_ready == 'true'
        run: |
          BACKEND_URL_CLEAN=$(printf '%s' "${{ secrets.BACKEND_URL }}" | tr -d '[:space:]' | sed 's|/*$||')
          CRON_SECRET_CLEAN=$(printf '%s' "${{ secrets.CRON_SECRET }}" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s -o /tmp/r.txt -w "%{http_code}" \
            -L --max-time 120 \
            --retry 2 --retry-delay 10 \
            -X POST "${BACKEND_URL_CLEAN}/api/news/refresh" \
            -H "Authorization: Bearer ${CRON_SECRET_CLEAN}" \
            -H "Content-Type: application/json")

          RESPONSE=$(cat /tmp/r.txt)
          echo "Backend returned HTTP status: ${HTTP_CODE}"
          echo "Response: ${RESPONSE}"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "News refresh completed successfully."
            exit 0
          elif [ "$HTTP_CODE" -eq 401 ]; then
            echo "ERROR: Unauthorized — check CRON_SECRET matches the backend CRON_SECRET env var."
            exit 1
          elif [ "$HTTP_CODE" -eq 503 ]; then
            echo "WARNING: AI search server unavailable. News cache not updated this run."
            exit 1
          else
            echo "ERROR: News refresh failed with HTTP ${HTTP_CODE}"
            exit 1
          fi