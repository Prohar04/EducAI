name: News Refresh

on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh news
        run: |
          STATUS=$(curl -s -o /tmp/r.txt -w "%{http_code}" \
            --max-time 60 --retry 2 \
            -X POST "${{ secrets.SERVER_URL }}/api/news/refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Status: $STATUS — $(cat /tmp/r.txt)"
          [ "$STATUS" = "000" ] && exit 0
          [ "$STATUS" = "404" ] && exit 0
          exit 0
