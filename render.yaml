services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Express API — EducAI Backend
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: educai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      # ── Database (Neon) ──────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      # ── Security ────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # ── Frontend CORS origin + email links ───────────────────────────────────
      # ── AI Server ────────────────────────────────────────────────────────────
      - key: AI_SERVER_URL
        sync: false   # set to your Render AI service URL
      - key: AI_SERVER_API_KEY
        sync: false   # must match MASTER_APIKEY on the AI server
      # ── Google OAuth ─────────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false   # https://<api-service>.onrender.com/auth/google/callback
      # ── Email (Gmail via custom SMTP) ───────────────────────────────────────────────
      # Gmail requires an App Password (16-char, no spaces) — generate at:
      #   https://myaccount.google.com/apppasswords
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: support.educai@gmail.com
      - key: SMTP_PASS
        sync: false   # Gmail App Password — set in Render dashboard secrets
      - key: EMAIL_FROM
        value: "EducAI <support.educai@gmail.com>"
      - key: FRONTEND_URL
        value: https://educai-web.vercel.app   # used for CORS and server-side email links
      # ── Optional: Resend (alternative to Gmail) ───────────────────────────────────
      # Comment out SMTP_* vars above and uncomment these if using Resend:
      # - key: SMTP_HOST
      #   value: smtp.resend.com
      # - key: SMTP_PORT
      #   value: "465"
      # - key: SMTP_SECURE
      #   value: "true"
      # - key: SMTP_USER
      #   value: resend
      # - key: SMTP_PASS
      #   sync: false   # Resend API key
      # ── Optional: Arcjet (bot/rate-limit protection) ─────────────────────────
      - key: ARCJET_KEY
        sync: false   # optional — leave empty to skip Arcjet
      # ── Optional: direct LLM fallback ────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CHAT_RATE_LIMIT_PER_MIN
        value: "20"
      # ── Job Finder API Keys ───────────────────────────────────────────────────
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      # ── Cron/Sync Authentication ────────────────────────────────────────────────
      - key: CRON_SECRET
        sync: false   # must match CRON_SECRET in GitHub Actions secrets
      # ── Supabase Storage (Gap Fix evidence) ─────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_EVIDENCE_BUCKET
        sync: false   # default: "evidence" — create this bucket in Supabase dashboard

  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI AI Server
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: educai-ai
    env: docker
    region: oregon
    plan: free
    rootDir: ai-server
    dockerfilePath: ai-server/Dockerfile
    dockerContext: ai-server
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "8001"
      - key: MASTER_APIKEY
        sync: false   # generate with: openssl rand -hex 32; must match AI_SERVER_API_KEY on Express
      # ── Database (shared Neon connection) ────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      # ── LLM Provider ─────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        sync: false   # openai | openrouter | gemini | groq | xai
      - key: LLM_MODEL
        sync: false
      # ── Express API back-reference ────────────────────────────────────────────
      - key: SERVER_BASE_URL
        sync: false   # https://<api-service>.onrender.com
      - key: INGEST_API_KEY
        sync: false
      # ── Optional: web search ─────────────────────────────────────────────────
      - key: SERPER_API_KEY
        sync: false
      # ── Optional: Firecrawl ───────────────────────────────────────────────────
      - key: FIRECRAWL_API_KEY
        sync: false
      # ── Optional: Apify scraping ─────────────────────────────────────────────
      - key: APIFY_APIKEY
        sync: false
      # ── Optional: ChromaDB (vector search) ────────────────────────────────────
      - key: CHROMADB_HOST
        sync: false   # leave empty to disable vector search on free tier
      - key: CHROMADB_PORT
        sync: false
      # ── Job Finder API Keys ───────────────────────────────────────────────────
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
